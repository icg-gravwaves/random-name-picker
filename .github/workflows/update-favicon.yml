name: Update favicon

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-favicon:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install pillow

      - name: Generate favicons
        run: |
          node scripts/generate-favicon.mjs
          python3 scripts/generate-favicon.py

      - name: Commit favicons if changed
        run: |
          if [ -z "$(git status --porcelain -- favicon.svg favicon.png)" ]; then
            echo "favicons unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add favicon.svg favicon.png
          git commit -m "Update favicons [skip ci]"
          git push
